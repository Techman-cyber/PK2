<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatuKrishi - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2e7d32, #f9a825);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-card h1 {
            color: #2e7d32;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .auth-card p {
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background: #1b5e20;
        }
        .error-msg {
            color: #f44336;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .success-msg {
            color: #4caf50;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .link {
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .link a {
            color: #2e7d32;
            text-decoration: none;
            cursor: pointer;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <h1>🌾 PatuKrishi</h1>
    <p>Your Farmer Friend</p>
    
    <div id="loginDiv">
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="link">New user? <a onclick="showSignup()">Create Account</a></div>
        <div id="loginError" class="error-msg"></div>
    </div>
    
    <div id="signupDiv" style="display:none;">
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email Address">
        <input type="password" id="signupPassword" placeholder="Password (min 4 chars)">
        <button onclick="signup()">Sign Up</button>
        <div class="link">Already have an account? <a onclick="showLogin()">Login</a></div>
        <div id="signupError" class="error-msg"></div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('patukrishi_users') || '{}');
    
    function login() {
        let email = document.getElementById('loginEmail').value;
        let password = document.getElementById('loginPassword').value;
        let error = document.getElementById('loginError');
        
        if (!email || !password) {
            error.innerText = '❌ Please fill all fields';
            return;
        }
        
        let user = users[email];
        if (!user) {
            error.innerText = '❌ Account not found. Please sign up.';
            return;
        }
        
        if (user.password !== password) {
            error.innerText = '❌ Incorrect password';
            return;
        }
        
        error.style.color = '#4caf50';
        error.innerText = '✅ Login successful! Redirecting...';
        
        setTimeout(() => {
            alert('Welcome ' + user.name + '! Dashboard coming soon.');
            window.location.href = 'dashboard.html';
        }, 1500);
    }
    
    function signup() {
        let name = document.getElementById('signupName').value;
        let email = document.getElementById('signupEmail').value;
        let password = document.getElementById('signupPassword').value;
        let error = document.getElementById('signupError');
        
        if (!name || !email || !password) {
            error.innerText = '❌ Please fill all fields';
            return;
        }
        
        if (password.length < 4) {
            error.innerText = '❌ Password must be at least 4 characters';
            return;
        }
        
        if (users[email]) {
            error.innerText = '❌ Email already registered. Please login.';
            return;
        }
        
        users[email] = { name, email, password };
        localStorage.setItem('patukrishi_users', JSON.stringify(users));
        
        error.style.color = '#4caf50';
        error.innerText = '✅ Account created! Please login.';
        
        setTimeout(() => {
            showLogin();
            document.getElementById('loginEmail').value = email;
        }, 1500);
    }
    
    function showSignup() {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('signupDiv').style.display = 'block';
        document.getElementById('loginError').innerText = '';
        document.getElementById('signupError').innerText = '';
    }
    
    function showLogin() {
        document.getElementById('signupDiv').style.display = 'none';
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('loginError').innerText = '';
        document.getElementById('signupError').innerText = '';
    }
</script>
</body>
</html>
